name: Security

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust-audit:
    name: Rust dependency audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Install Rust
        run: rustup toolchain install stable --profile minimal
      - name: Install cargo-audit
        run: cargo install cargo-audit --version 0.22.1 --locked
      - name: Audit Cargo.lock
        run: cargo audit --locked

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: astral-sh/setup-uv@e58605a9b6da7c637471fab8847a5e5a6b8df081
        with:
          version: "0.11.6"
      - name: Export locked Python dependencies
        run: uv export --locked --format requirements-txt --all-groups --no-hashes --output-file /tmp/requirements.txt
      - name: Install pip-audit
        run: python -m pip install pip-audit==2.10.0
      - name: Audit Python dependencies
        run: python -m pip_audit -r /tmp/requirements.txt
